<div class="letta-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b data-i18n="{{title}}">{{title}}</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content" data-i18n="How many messages back to send to cleared chats." title="How many messages back to send to cleared chats.">
            <label for="letta_sync_n_messages">
                <span data-i18n="Sync Messages">Sync Messages</span>
            </label>
            <input id="letta_sync_n_messages" class="text_pole" type="number" value="{{sync_n_messages}}" />
        </div>
    </div>
</div>
